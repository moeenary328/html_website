<!DOCTYPE html>
<!-- 
  ============================================
  NAVBAR.HTML - Premium Responsive Navbar (Fixed Mobile Menu)
  ============================================
-->

<nav class="pro-navbar" id="proNavbar">
  <!-- Logo Section -->
  <a href="index.html" class="navbar-logo">
    <div class="logo-wrapper">
      <img src="logo.jpeg" alt="Moeen Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/45/6a11cb/ffffff?text=M'">
      <div class="logo-glow"></div>
    </div>
    <span class="logo-text">Moeen</span>
  </a>

  <!-- Navigation Links -->
  <ul class="navbar-links" id="navbarLinks">
    <li><a href="index.html" class="nav-link nav-home">
      <i class="fas fa-home"></i>
      <span>Home</span>
    </a></li>
    <li><a href="index.html#skills" class="nav-link nav-skills">
      <i class="fas fa-code"></i>
      <span>Skills</span>
    </a></li>
    <li><a href="index.html#services" class="nav-link nav-services">
      <i class="fas fa-cogs"></i>
      <span>Services</span>
    </a></li>
    <li><a href="index.html#portfolio" class="nav-link nav-work">
      <i class="fas fa-briefcase"></i>
      <span>Work</span>
    </a></li>
    <li><a href="index.html#contact" class="nav-link nav-contact">
      <i class="fas fa-envelope"></i>
      <span>Contact</span>
    </a></li>
    <li><a href="index2.html" class="nav-link nav-gallery">
      <i class="fas fa-grid-2"></i>
      <span>Gallery</span>
    </a></li>
    <li><a href="https://www.calculatingwithme.com/" target="_blank" class="nav-link nav-oldsite">
      <i class="fas fa-external-link-alt"></i>
      <span>2nd Site</span>

  </ul>

  <!-- Search Bar -->
  <div class="navbar-search">
    <i class="fas fa-search search-icon"></i>
    <input type="text" class="search-input" id="searchInput" placeholder="Search projects...">
    <i class="fas fa-times search-clear" id="searchClear"></i>
  </div>

  <!-- Mobile Menu Toggle Button -->
  <button class="mobile-menu-btn" id="mobileMenuBtn">
    <i class="fas fa-bars"></i>
  </button>
</nav>

<style>
  /* ============================================
     PREMIUM NAVBAR STYLES - FULLY RESPONSIVE
     ============================================ */
  
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  .pro-navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: rgba(255, 255, 255, 0.98);
    backdrop-filter: blur(20px);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    z-index: 10000;
    padding: 12px 5%;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 15px;
  }

  /* Scroll Effect */
  .pro-navbar.scrolled {
    padding: 8px 5%;
    background: rgba(255, 255, 255, 0.98);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
  }

  /* ========== LOGO STYLES ========== */
  .navbar-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    position: relative;
  }

  .logo-wrapper {
    position: relative;
  }

  .logo-img {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    object-fit: cover;
    transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    box-shadow: 0 4px 15px rgba(106, 17, 203, 0.3);
    position: relative;
    z-index: 2;
  }

  .logo-glow {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(106, 17, 203, 0.6), transparent);
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }

  .navbar-logo:hover .logo-img {
    transform: scale(1.08) rotate(5deg);
  }

  .navbar-logo:hover .logo-glow {
    opacity: 0.8;
    animation: pulseGlow 1s ease;
  }

  @keyframes pulseGlow {
    0% { transform: scale(0.8); opacity: 0; }
    50% { transform: scale(1.2); opacity: 0.6; }
    100% { transform: scale(1); opacity: 0; }
  }

  .logo-text {
    font-size: 1.4rem;
    font-weight: 800;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
    transition: all 0.3s ease;
  }

  .navbar-logo:hover .logo-text {
    letter-spacing: 0px;
  }

  /* ========== NAVIGATION LINKS ========== */
  .navbar-links {
    display: flex;
    gap: 8px;
    list-style: none;
    margin: 0;
    padding: 0;
    flex-wrap: wrap;
  }

  .nav-link {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    text-decoration: none;
    color: #1a1a2e;
    font-weight: 500;
    font-size: 0.95rem;
    border-radius: 50px;
    transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    position: relative;
  }

  .nav-link i {
    font-size: 1rem;
    transition: transform 0.3s ease;
  }

  .nav-link:hover {
    background: linear-gradient(135deg, rgba(106, 17, 203, 0.08), rgba(37, 117, 252, 0.08));
    transform: translateY(-2px);
  }

  .nav-link:hover i {
    transform: translateY(-2px);
  }

  /* Active Link Style */
  .nav-link.active {
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    color: white;
    box-shadow: 0 5px 15px rgba(106, 17, 203, 0.3);
  }

  /* Old Site Button */
  .nav-oldsite {
    background: linear-gradient(135deg, rgba(106, 17, 203, 0.12), rgba(37, 117, 252, 0.12));
    border: 1px solid rgba(106, 17, 203, 0.3);
  }

  .nav-oldsite:hover {
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    border-color: transparent;
    color: white;
  }

  /* ========== SEARCH BAR ========== */
  .navbar-search {
    position: relative;
    min-width: 260px;
  }

  .search-input {
    width: 100%;
    background: #f5f5f5;
    border: 1px solid #e0e0e0;
    border-radius: 50px;
    padding: 12px 20px 12px 45px;
    font-size: 0.95rem;
    transition: all 0.3s ease;
    font-family: inherit;
  }

  .search-input:focus {
    outline: none;
    border-color: #6a11cb;
    background: white;
    box-shadow: 0 0 0 3px rgba(106, 17, 203, 0.1);
  }

  .search-input::placeholder {
    color: #adb5bd;
  }

  .search-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: #adb5bd;
    font-size: 1rem;
    pointer-events: none;
  }

  .search-clear {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: #adb5bd;
    cursor: pointer;
    display: none;
    transition: color 0.3s ease;
  }

  .search-clear:hover {
    color: #ff6b6b;
  }

  /* ========== MOBILE MENU BUTTON ========== */
  .mobile-menu-btn {
    display: none;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    border: none;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    color: white;
    font-size: 1.2rem;
    cursor: pointer;
    transition: all 0.3s ease;
    align-items: center;
    justify-content: center;
  }

  .mobile-menu-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 5px 15px rgba(106, 17, 203, 0.4);
  }

  /* ========== RESPONSIVE DESIGN - FIXED MOBILE MENU ========== */
  @media (max-width: 1024px) {
    .navbar-links {
      gap: 4px;
    }
    .nav-link {
      padding: 8px 14px;
      font-size: 0.85rem;
    }
    .navbar-search {
      min-width: 220px;
    }
  }

  @media (max-width: 900px) {
    .pro-navbar {
      padding: 12px 4%;
    }
    
    /* Mobile Menu Button - Show */
    .mobile-menu-btn {
      display: flex;
      order: 3;
    }
    
    /* Navigation Links - Hide by default */
    .navbar-links {
      display: none;
      width: 100%;
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
      padding: 20px 0 10px;
      order: 4;
      background: transparent;
    }
    
    /* When menu is open - Show */
    .navbar-links.show {
      display: flex;
      animation: slideDown 0.3s ease;
    }
    
    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* Mobile Menu Links Style */
    .nav-link {
      justify-content: center;
      padding: 14px 20px;
      font-size: 1rem;
      width: 100%;
    }
    
    .nav-link i {
      font-size: 1.1rem;
    }
    
    /* Search Bar */
    .navbar-search {
      order: 2;
      flex: 1;
      min-width: auto;
    }
    
    /* Logo */
    .navbar-logo {
      order: 1;
    }
    
    .search-input {
      padding: 10px 20px 10px 42px;
    }
  }

  @media (max-width: 600px) {
    .pro-navbar {
      padding: 10px 4%;
    }
    
    .logo-img {
      width: 38px;
      height: 38px;
    }
    
    .logo-text {
      font-size: 1.1rem;
    }
    
    .navbar-search {
      max-width: 180px;
    }
    
    .search-input {
      padding: 8px 15px 8px 38px;
      font-size: 0.85rem;
    }
    
    .search-icon {
      left: 14px;
      font-size: 0.85rem;
    }
    
    .mobile-menu-btn {
      width: 40px;
      height: 40px;
      font-size: 1rem;
    }
    
    .nav-link {
      padding: 12px 16px;
      font-size: 0.9rem;
    }
  }

  @media (max-width: 450px) {
    .navbar-search {
      max-width: 140px;
    }
    
    .search-input {
      padding: 7px 12px 7px 35px;
      font-size: 0.8rem;
    }
    
    .search-icon {
      left: 12px;
      font-size: 0.75rem;
    }
    
    .logo-text {
      font-size: 0.95rem;
    }
    
    .logo-img {
      width: 32px;
      height: 32px;
    }
  }

  /* Body padding for fixed navbar */
  body {
    padding-top: 80px !important;
  }
  
  @media (max-width: 900px) {
    body {
      padding-top: 85px !important;
    }
  }
  
  @media (max-width: 600px) {
    body {
      padding-top: 80px !important;
    }
  }
</style>

<script>
  // ============================================
  // NAVBAR JAVASCRIPT - FIXED MOBILE MENU
  // ============================================

  (function() {
    // DOM Elements
    const mobileBtn = document.getElementById('mobileMenuBtn');
    const navbarLinks = document.getElementById('navbarLinks');
    const navbar = document.getElementById('proNavbar');
    
    // ========== 1. MOBILE MENU TOGGLE (FIXED) ==========
    function setupMobileMenu() {
      if (!mobileBtn || !navbarLinks) return;
      
      // Toggle menu on button click
      mobileBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        navbarLinks.classList.toggle('show');
        
        // Change icon
        const icon = this.querySelector('i');
        if (navbarLinks.classList.contains('show')) {
          icon.classList.remove('fa-bars');
          icon.classList.add('fa-times');
        } else {
          icon.classList.remove('fa-times');
          icon.classList.add('fa-bars');
        }
      });
      
      // Close menu when clicking a link
      const allLinks = navbarLinks.querySelectorAll('.nav-link');
      allLinks.forEach(link => {
        link.addEventListener('click', function() {
          navbarLinks.classList.remove('show');
          if (mobileBtn) {
            const icon = mobileBtn.querySelector('i');
            icon.classList.remove('fa-times');
            icon.classList.add('fa-bars');
          }
        });
      });
      
      // Close menu when clicking outside (optional)
      document.addEventListener('click', function(event) {
        if (navbarLinks.classList.contains('show')) {
          // Check if click is outside navbar
          const isClickInside = navbar?.contains(event.target);
          if (!isClickInside) {
            navbarLinks.classList.remove('show');
            if (mobileBtn) {
              const icon = mobileBtn.querySelector('i');
              icon.classList.remove('fa-times');
              icon.classList.add('fa-bars');
            }
          }
        }
      });
    }
    
    // ========== 2. SCROLL EFFECT ==========
    function handleScrollEffect() {
      if (navbar) {
        if (window.scrollY > 50) {
          navbar.classList.add('scrolled');
        } else {
          navbar.classList.remove('scrolled');
        }
      }
    }
    
    // ========== 3. ACTIVE PAGE HIGHLIGHT ==========
    function highlightActivePage() {
      const currentPage = window.location.pathname.split('/').pop() || 'index.html';
      const currentHash = window.location.hash;
      
      document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.remove('active');
      });
      
      if (currentPage === 'index.html') {
        if (currentHash === '#skills') {
          document.querySelector('.nav-skills')?.classList.add('active');
        } else if (currentHash === '#services') {
          document.querySelector('.nav-services')?.classList.add('active');
        } else if (currentHash === '#portfolio') {
          document.querySelector('.nav-work')?.classList.add('active');
        } else if (currentHash === '#contact') {
          document.querySelector('.nav-contact')?.classList.add('active');
        } else {
          document.querySelector('.nav-home')?.classList.add('active');
        }
      } else if (currentPage === 'index2.html') {
        document.querySelector('.nav-gallery')?.classList.add('active');
      }
    }
    
    // ========== 4. SEARCH FUNCTIONALITY ==========
    function setupSearch() {
      const searchInput = document.getElementById('searchInput');
      const searchClear = document.getElementById('searchClear');
      
      if (searchInput) {
        function handleSearch() {
          const searchTerm = searchInput.value.toLowerCase();
          if (searchTerm) {
            searchClear.style.display = 'block';
          } else {
            searchClear.style.display = 'none';
          }
          
          if (window.location.pathname.includes('index2.html') && typeof window.filterProjects === 'function') {
            window.filterProjects(searchTerm);
          }
        }
        
        searchInput.addEventListener('input', handleSearch);
        
        if (searchClear) {
          searchClear.addEventListener('click', () => {
            searchInput.value = '';
            searchClear.style.display = 'none';
            if (window.location.pathname.includes('index2.html') && typeof window.filterProjects === 'function') {
              window.filterProjects('');
            }
            showToast('Search cleared! ✨');
          });
        }
      }
    }
    
    // ========== 5. TOAST NOTIFICATION ==========
    function showToast(message) {
      let toast = document.getElementById('dynamic-toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'dynamic-toast';
        toast.style.cssText = `
          position: fixed;
          bottom: 30px;
          right: 30px;
          background: linear-gradient(135deg, #6a11cb, #2575fc);
          color: white;
          padding: 12px 25px;
          border-radius: 50px;
          z-index: 10001;
          font-size: 0.9rem;
          font-weight: 500;
          box-shadow: 0 5px 20px rgba(0,0,0,0.2);
          opacity: 0;
          transform: translateX(100px);
          transition: all 0.3s ease;
          pointer-events: none;
        `;
        document.body.appendChild(toast);
      }
      
      toast.textContent = message;
      toast.style.opacity = '1';
      toast.style.transform = 'translateX(0)';
      
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100px)';
      }, 3000);
    }
    
    // ========== 6. RESIZE HANDLER ==========
    function handleResize() {
      if (window.innerWidth > 900 && navbarLinks) {
        navbarLinks.classList.remove('show');
        if (mobileBtn) {
          const icon = mobileBtn.querySelector('i');
          icon.classList.remove('fa-times');
          icon.classList.add('fa-bars');
        }
      }
    }
    
    // ========== 7. HASH CHANGE HANDLER ==========
    function handleHashChange() {
      highlightActivePage();
    }
    
    // ========== 8. INITIALIZE ALL ==========
    function initNavbar() {
      setupMobileMenu();
      handleScrollEffect();
      highlightActivePage();
      setupSearch();
      
      window.addEventListener('scroll', handleScrollEffect);
      window.addEventListener('hashchange', handleHashChange);
      window.addEventListener('resize', handleResize);
    }
    
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initNavbar);
    } else {
      initNavbar();
    }
  })();
</script>
