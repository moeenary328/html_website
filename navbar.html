<!DOCTYPE html>
<!-- 
  ============================================
  NAVBAR.HTML - Professional Navbar for Portfolio
  ============================================
  This file contains complete navbar with:
  - Logo + Name
  - Navigation Links (Home, Skills, Services, Work, Contact, Gallery, Old Site)
  - Search Bar
  - Responsive Mobile Menu
  - Active Page Highlight
  - Smooth Animations
  ============================================
-->

<nav class="pro-navbar">
  <!-- Logo Section -->
  <a href="index.html" class="navbar-logo">
    <div class="logo-wrapper">
      <img src="logo.jpeg" alt="Moeen Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/45/6a11cb/ffffff?text=M'">
      <div class="logo-glow"></div>
    </div>
    <span class="logo-text">Moeen</span>
  </a>

  <!-- Navigation Links -->
  <ul class="navbar-links" id="navbarLinks">
    <li><a href="index.html" class="nav-link nav-home">
      <i class="fas fa-home"></i>
      <span>Home</span>
    </a></li>
    <li><a href="index.html#skills" class="nav-link nav-skills">
      <i class="fas fa-code"></i>
      <span>Skills</span>
    </a></li>
    <li><a href="index.html#services" class="nav-link nav-services">
      <i class="fas fa-cogs"></i>
      <span>Services</span>
    </a></li>
    <li><a href="index.html#portfolio" class="nav-link nav-work">
      <i class="fas fa-briefcase"></i>
      <span>Work</span>
    </a></li>
    <li><a href="index.html#contact" class="nav-link nav-contact">
      <i class="fas fa-envelope"></i>
      <span>Contact</span>
    </a></li>
    <li><a href="index2.html" class="nav-link nav-gallery">
      <i class="fas fa-grid-2"></i>
      <span>Gallery</span>
    </a></li>
    <li><a href="https://www.calculatingwithme.com/" target="_blank" class="nav-link nav-oldsite">
      <i class="fas fa-external-link-alt"></i>
      <span>2nd Site</span>
    </a></li>
  </ul>

  <!-- Search Bar -->
  <div class="navbar-search">
    <i class="fas fa-search search-icon"></i>
    <input type="text" class="search-input" id="searchInput" placeholder="Search projects...">
    <i class="fas fa-times search-clear" id="searchClear"></i>
  </div>

  <!-- Mobile Menu Toggle Button -->
  <button class="mobile-menu-btn" id="mobileMenuBtn">
    <i class="fas fa-bars"></i>
  </button>
</nav>

<style>
  /* ============================================
     PRO NAVBAR STYLES - Complete Professional Design
     ============================================ */
  
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  .pro-navbar {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 1400px;
    background: rgba(255, 255, 255, 0.98);
    backdrop-filter: blur(20px);
    border-radius: 80px;
    padding: 8px 25px;
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
    border: 1px solid rgba(106, 17, 203, 0.15);
    transition: all 0.3s ease;
  }

  /* Navbar Scroll Effect */
  .pro-navbar.scrolled {
    top: 10px;
    background: rgba(255, 255, 255, 0.98);
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
    border-color: rgba(106, 17, 203, 0.3);
  }

  /* ========== LOGO STYLES ========== */
  .navbar-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    position: relative;
  }

  .logo-wrapper {
    position: relative;
  }

  .logo-img {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    object-fit: cover;
    transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    box-shadow: 0 4px 15px rgba(106, 17, 203, 0.3);
    position: relative;
    z-index: 2;
  }

  .logo-glow {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(106, 17, 203, 0.6), transparent);
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }

  .navbar-logo:hover .logo-img {
    transform: scale(1.08) rotate(5deg);
  }

  .navbar-logo:hover .logo-glow {
    opacity: 0.8;
    animation: pulseGlow 1s ease;
  }

  @keyframes pulseGlow {
    0% { transform: scale(0.8); opacity: 0; }
    50% { transform: scale(1.2); opacity: 0.6; }
    100% { transform: scale(1); opacity: 0; }
  }

  .logo-text {
    font-size: 1.4rem;
    font-weight: 800;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
    transition: all 0.3s ease;
  }

  .navbar-logo:hover .logo-text {
    letter-spacing: 0px;
  }

  /* ========== NAVIGATION LINKS ========== */
  .navbar-links {
    display: flex;
    gap: 8px;
    list-style: none;
    margin: 0;
    padding: 0;
  }

  .nav-link {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    text-decoration: none;
    color: #1a1a2e;
    font-weight: 500;
    font-size: 0.95rem;
    border-radius: 50px;
    transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    position: relative;
    overflow: hidden;
  }

  .nav-link i {
    font-size: 1rem;
    transition: transform 0.3s ease;
  }

  .nav-link span {
    position: relative;
  }

  /* Link Hover Effect */
  .nav-link::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 2px;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    transition: width 0.3s ease;
  }

  .nav-link:hover::before {
    width: 70%;
  }

  .nav-link:hover {
    background: linear-gradient(135deg, rgba(106, 17, 203, 0.08), rgba(37, 117, 252, 0.08));
    transform: translateY(-2px);
  }

  .nav-link:hover i {
    transform: translateY(-2px);
  }

  /* Active Link Style */
  .nav-link.active {
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    color: white;
    box-shadow: 0 5px 15px rgba(106, 17, 203, 0.3);
  }

  .nav-link.active::before {
    display: none;
  }

  .nav-link.active i {
    transform: none;
  }

  /* Old Site Button Special Style */
  .nav-oldsite {
    background: linear-gradient(135deg, rgba(106, 17, 203, 0.12), rgba(37, 117, 252, 0.12));
    border: 1px solid rgba(106, 17, 203, 0.3);
  }

  .nav-oldsite:hover {
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    border-color: transparent;
    color: white;
  }

  /* ========== SEARCH BAR ========== */
  .navbar-search {
    position: relative;
    display: flex;
    align-items: center;
  }

  .search-input {
    background: rgba(0, 0, 0, 0.04);
    border: 1px solid rgba(0, 0, 0, 0.1);
    border-radius: 50px;
    padding: 10px 20px 10px 45px;
    font-size: 0.9rem;
    width: 220px;
    transition: all 0.3s ease;
    font-family: inherit;
  }

  .search-input:focus {
    outline: none;
    width: 280px;
    border-color: #6a11cb;
    background: white;
    box-shadow: 0 0 0 3px rgba(106, 17, 203, 0.1);
  }

  .search-input::placeholder {
    color: rgba(0, 0, 0, 0.4);
  }

  .search-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(0, 0, 0, 0.4);
    font-size: 0.9rem;
    pointer-events: none;
  }

  .search-clear {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(0, 0, 0, 0.4);
    cursor: pointer;
    display: none;
    font-size: 0.8rem;
    transition: color 0.3s ease;
  }

  .search-clear:hover {
    color: #ff6b6b;
  }

  /* ========== MOBILE MENU BUTTON ========== */
  .mobile-menu-btn {
    display: none;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    border: none;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    color: white;
    font-size: 1.2rem;
    cursor: pointer;
    transition: all 0.3s ease;
    align-items: center;
    justify-content: center;
  }

  .mobile-menu-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 5px 15px rgba(106, 17, 203, 0.4);
  }

  /* ========== RESPONSIVE DESIGN ========== */
  @media (max-width: 1100px) {
    .navbar-links {
      gap: 4px;
    }
    .nav-link {
      padding: 8px 12px;
      font-size: 0.85rem;
    }
    .search-input {
      width: 180px;
    }
    .search-input:focus {
      width: 220px;
    }
  }

  @media (max-width: 968px) {
    .pro-navbar {
      flex-wrap: wrap;
      padding: 12px 20px;
      border-radius: 30px;
      top: 10px;
      width: 95%;
    }

    .mobile-menu-btn {
      display: flex;
    }

    .navbar-links {
      display: none;
      width: 100%;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      padding: 15px 0 5px;
      order: 3;
    }

    .navbar-links.show {
      display: flex;
    }

    .nav-link {
      justify-content: center;
      padding: 12px 20px;
    }

    .navbar-search {
      order: 2;
      flex: 1;
      max-width: 250px;
    }

    .search-input {
      width: 100%;
    }

    .search-input:focus {
      width: 100%;
    }
  }

  @media (max-width: 580px) {
    .pro-navbar {
      flex-wrap: wrap;
      gap: 12px;
    }

    .navbar-logo {
      order: 1;
    }

    .navbar-search {
      order: 2;
      max-width: 200px;
    }

    .mobile-menu-btn {
      order: 3;
    }

    .navbar-links {
      order: 4;
    }

    .logo-text {
      font-size: 1.1rem;
    }

    .logo-img {
      width: 38px;
      height: 38px;
    }
  }

  @media (max-width: 480px) {
    .navbar-search {
      max-width: 150px;
    }
    
    .search-input {
      padding: 8px 15px 8px 38px;
      font-size: 0.8rem;
    }
    
    .search-icon {
      left: 12px;
      font-size: 0.8rem;
    }
  }
</style>

<script>
  // ============================================
  // NAVBAR JAVASCRIPT - Complete Functionality
  // ============================================

  (function() {
    // ========== 1. ACTIVE PAGE HIGHLIGHT ==========
    function highlightActivePage() {
      const currentPage = window.location.pathname.split('/').pop() || 'index.html';
      const currentHash = window.location.hash;
      
      // Remove active class from all links
      document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.remove('active');
      });
      
      // Highlight based on current page and hash
      if (currentPage === 'index.html') {
        if (currentHash === '#skills') {
          document.querySelector('.nav-skills')?.classList.add('active');
        } else if (currentHash === '#services') {
          document.querySelector('.nav-services')?.classList.add('active');
        } else if (currentHash === '#portfolio') {
          document.querySelector('.nav-work')?.classList.add('active');
        } else if (currentHash === '#contact') {
          document.querySelector('.nav-contact')?.classList.add('active');
        } else {
          document.querySelector('.nav-home')?.classList.add('active');
        }
      } else if (currentPage === 'index2.html') {
        document.querySelector('.nav-gallery')?.classList.add('active');
      }
    }

    // ========== 2. SCROLL EFFECT ==========
    function handleScrollEffect() {
      const navbar = document.querySelector('.pro-navbar');
      if (navbar) {
        if (window.scrollY > 50) {
          navbar.classList.add('scrolled');
        } else {
          navbar.classList.remove('scrolled');
        }
      }
    }

    // ========== 3. MOBILE MENU TOGGLE ==========
    function setupMobileMenu() {
      const mobileBtn = document.getElementById('mobileMenuBtn');
      const navbarLinks = document.getElementById('navbarLinks');
      
      if (mobileBtn && navbarLinks) {
        mobileBtn.addEventListener('click', () => {
          navbarLinks.classList.toggle('show');
          
          // Change icon based on menu state
          const icon = mobileBtn.querySelector('i');
          if (navbarLinks.classList.contains('show')) {
            icon.classList.remove('fa-bars');
            icon.classList.add('fa-times');
          } else {
            icon.classList.remove('fa-times');
            icon.classList.add('fa-bars');
          }
        });
        
        // Close menu when clicking a link
        navbarLinks.querySelectorAll('.nav-link').forEach(link => {
          link.addEventListener('click', () => {
            navbarLinks.classList.remove('show');
            const icon = mobileBtn.querySelector('i');
            icon.classList.remove('fa-times');
            icon.classList.add('fa-bars');
          });
        });
      }
    }

    // ========== 4. SEARCH FUNCTIONALITY ==========
    function setupSearch() {
      const searchInput = document.getElementById('searchInput');
      const searchClear = document.getElementById('searchClear');
      
      if (searchInput) {
        // Handle search input
        function handleSearch() {
          const searchTerm = searchInput.value.toLowerCase();
          if (searchTerm) {
            searchClear.style.display = 'block';
          } else {
            searchClear.style.display = 'none';
          }
          
          // If on gallery page and filterProjects function exists
          if (window.location.pathname.includes('index2.html') && typeof window.filterProjects === 'function') {
            window.filterProjects(searchTerm);
          }
        }
        
        searchInput.addEventListener('input', handleSearch);
        
        // Clear search
        if (searchClear) {
          searchClear.addEventListener('click', () => {
            searchInput.value = '';
            searchClear.style.display = 'none';
            if (window.location.pathname.includes('index2.html') && typeof window.filterProjects === 'function') {
              window.filterProjects('');
            }
            showToast('Search cleared! ✨');
          });
        }
      }
    }

    // ========== 5. TOAST NOTIFICATION ==========
    function showToast(message) {
      let toast = document.getElementById('dynamic-toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'dynamic-toast';
        toast.style.cssText = `
          position: fixed;
          bottom: 30px;
          right: 30px;
          background: linear-gradient(135deg, #6a11cb, #2575fc);
          color: white;
          padding: 12px 25px;
          border-radius: 50px;
          z-index: 10001;
          font-size: 0.9rem;
          font-weight: 500;
          box-shadow: 0 5px 20px rgba(0,0,0,0.2);
          opacity: 0;
          transform: translateX(100px);
          transition: all 0.3s ease;
          pointer-events: none;
        `;
        document.body.appendChild(toast);
      }
      
      toast.textContent = message;
      toast.style.opacity = '1';
      toast.style.transform = 'translateX(0)';
      
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100px)';
      }, 3000);
    }

    // ========== 6. HASH CHANGE HANDLER ==========
    function handleHashChange() {
      highlightActivePage();
    }

    // ========== 7. INITIALIZE ALL FUNCTIONS ==========
    function initNavbar() {
      highlightActivePage();
      handleScrollEffect();
      setupMobileMenu();
      setupSearch();
      
      // Add event listeners
      window.addEventListener('scroll', handleScrollEffect);
      window.addEventListener('hashchange', handleHashChange);
    }
    
    // Run when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initNavbar);
    } else {
      initNavbar();
    }
  })();
</script>
