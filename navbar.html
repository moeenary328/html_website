<style>
  /* ============================================
     NAVBAR STYLES - ALWAYS VISIBLE BUTTONS
     ============================================ */
  
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  .pro-navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: white;
    box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
    z-index: 10000;
    padding: 12px 20px;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  /* Scroll Effect */
  .pro-navbar.scrolled {
    padding: 8px 20px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
  }

  /* ========== LOGO STYLES ========== */
  .navbar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    flex-shrink: 0;
  }

  .logo-img {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 2px 10px rgba(106, 17, 203, 0.2);
    transition: transform 0.3s ease;
  }

  .logo-img:hover {
    transform: scale(1.05);
  }

  .logo-glow {
    display: none;
  }

  .logo-text {
    font-size: 1.3rem;
    font-weight: 800;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* ========== NAVIGATION LINKS - ALWAYS VISIBLE ========== */
  .navbar-links {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    list-style: none;
    margin: 0;
    padding: 0;
    flex: 1;
    justify-content: center;
  }

  .nav-link {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    text-decoration: none;
    color: #1a1a2e;
    font-weight: 500;
    font-size: 0.9rem;
    border-radius: 40px;
    transition: all 0.3s ease;
    white-space: nowrap;
  }

  .nav-link i {
    font-size: 0.9rem;
  }

  .nav-link:hover {
    background: rgba(106, 17, 203, 0.1);
    transform: translateY(-2px);
  }

  /* Active Link Style */
  .nav-link.active {
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    color: white;
    box-shadow: 0 4px 12px rgba(106, 17, 203, 0.3);
  }

  /* Old Site Button */
  .nav-oldsite {
    background: rgba(106, 17, 203, 0.1);
    border: 1px solid rgba(106, 17, 203, 0.2);
  }

  .nav-oldsite:hover {
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    color: white;
    border-color: transparent;
  }

  /* ========== SEARCH BAR ========== */
  .navbar-search {
    position: relative;
    min-width: 220px;
    flex-shrink: 0;
  }

  .search-input {
    width: 100%;
    background: #f5f5f5;
    border: 1px solid #e0e0e0;
    border-radius: 50px;
    padding: 8px 16px 8px 38px;
    font-size: 0.85rem;
    transition: all 0.3s ease;
  }

  .search-input:focus {
    outline: none;
    border-color: #6a11cb;
    background: white;
    box-shadow: 0 0 0 3px rgba(106, 17, 203, 0.1);
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #999;
    font-size: 0.85rem;
    pointer-events: none;
  }

  .search-clear {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #999;
    cursor: pointer;
    display: none;
  }

  .search-clear:hover {
    color: #ff6b6b;
  }

  /* ========== RESPONSIVE - BUTTONS ALWAYS VISIBLE ========== */
  
  /* Tablet */
  @media (max-width: 1100px) {
    .nav-link {
      padding: 6px 10px;
      font-size: 0.8rem;
    }
    .navbar-search {
      min-width: 180px;
    }
  }

  /* Mobile - Buttons wrap and always visible */
  @media (max-width: 850px) {
    .pro-navbar {
      padding: 10px 15px;
      flex-direction: column;
      align-items: stretch;
    }
    
    .navbar-logo {
      justify-content: center;
      margin-bottom: 5px;
    }
    
    .navbar-links {
      justify-content: center;
      gap: 8px;
      margin: 5px 0;
    }
    
    .nav-link {
      padding: 8px 12px;
      font-size: 0.8rem;
    }
    
    .navbar-search {
      width: 100%;
      min-width: auto;
      margin-top: 5px;
    }
    
    .search-input {
      padding: 8px 16px 8px 38px;
    }
  }

  /* Small Mobile */
  @media (max-width: 600px) {
    .navbar-links {
      gap: 6px;
    }
    
    .nav-link {
      padding: 6px 10px;
      font-size: 0.7rem;
    }
    
    .nav-link i {
      font-size: 0.7rem;
    }
    
    .logo-text {
      font-size: 1rem;
    }
    
    .logo-img {
      width: 35px;
      height: 35px;
    }
  }

  /* Extra Small Mobile - Buttons adjust */
  @media (max-width: 480px) {
    .navbar-links {
      gap: 5px;
    }
    
    .nav-link {
      padding: 5px 8px;
      font-size: 0.65rem;
    }
    
    .nav-link span {
      display: inline-block;
    }
    
    .logo-text {
      font-size: 0.9rem;
    }
  }

  /* Body padding for fixed navbar */
  body {
    padding-top: 85px !important;
  }
  
  @media (max-width: 850px) {
    body {
      padding-top: 130px !important;
    }
  }
  
  @media (max-width: 600px) {
    body {
      padding-top: 120px !important;
    }
  }
  
  @media (max-width: 480px) {
    body {
      padding-top: 115px !important;
    }
  }
</style>

<script>
  // ============================================
  // SIMPLE NAVBAR JS - NO HAMBURGER MENU
  // ============================================

  (function() {
    const navbar = document.getElementById('proNavbar');
    
    // ========== 1. SCROLL EFFECT ==========
    window.addEventListener('scroll', function() {
      if (window.scrollY > 50) {
        navbar.classList.add('scrolled');
      } else {
        navbar.classList.remove('scrolled');
      }
    });
    
    // ========== 2. ACTIVE PAGE HIGHLIGHT ==========
    function highlightActivePage() {
      const currentPage = window.location.pathname.split('/').pop() || 'index.html';
      const currentHash = window.location.hash;
      
      // Remove all active classes
      document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.remove('active');
      });
      
      // Add active class based on current page
      if (currentPage === 'index.html') {
        if (currentHash === '#skills') {
          const skillLink = document.querySelector('.nav-skills');
          if (skillLink) skillLink.classList.add('active');
        } else if (currentHash === '#services') {
          const servicesLink = document.querySelector('.nav-services');
          if (servicesLink) servicesLink.classList.add('active');
        } else if (currentHash === '#portfolio') {
          const workLink = document.querySelector('.nav-work');
          if (workLink) workLink.classList.add('active');
        } else if (currentHash === '#contact') {
          const contactLink = document.querySelector('.nav-contact');
          if (contactLink) contactLink.classList.add('active');
        } else {
          const homeLink = document.querySelector('.nav-home');
          if (homeLink) homeLink.classList.add('active');
        }
      } else if (currentPage === 'index2.html') {
        const galleryLink = document.querySelector('.nav-gallery');
        if (galleryLink) galleryLink.classList.add('active');
      }
    }
    
    // Call on load and hash change
    highlightActivePage();
    window.addEventListener('hashchange', highlightActivePage);
    
    // ========== 3. SEARCH FUNCTIONALITY ==========
    const searchInput = document.getElementById('searchInput');
    const searchClear = document.getElementById('searchClear');
    
    if (searchInput) {
      searchInput.addEventListener('input', function() {
        const searchTerm = this.value.toLowerCase();
        if (searchTerm) {
          searchClear.style.display = 'block';
        } else {
          searchClear.style.display = 'none';
        }
        
        // For gallery page search
        if (window.location.pathname.includes('index2.html') && typeof window.filterProjects === 'function') {
          window.filterProjects(searchTerm);
        }
      });
    }
    
    if (searchClear) {
      searchClear.addEventListener('click', function() {
        searchInput.value = '';
        searchClear.style.display = 'none';
        if (window.location.pathname.includes('index2.html') && typeof window.filterProjects === 'function') {
          window.filterProjects('');
        }
      });
    }
  })();
</script>
